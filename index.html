<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>写真からカレンダー作成</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@7.0.0/dist/tesseract.min.js"></script>
</head>
<body>
  <header class="header">
    <h1>写真からカレンダー作成</h1>
    <p class="header__sub">画像を読み取って、予定をかんたん登録</p>
  </header>

  <main class="layout">
    <section class="card">
      <h2 class="card__title">画像を取り込む</h2>

      <div class="dropzone" id="uploadArea">
        <input type="file" id="imageInput" accept="image/*" hidden />
        <p class="dropzone__hint">画像をドラッグ＆ドロップ</p>
        <button id="selectButton" type="button" class="btn btn--outline">ファイルを選ぶ</button>
      </div>

      <div class="preview">
        <span class="preview__placeholder">画像が表示されます</span>
        <img id="previewImage" alt="読み取り対象の画像" />
      </div>

      <div class="actions">
        <button id="ocrButton" type="button" class="btn btn--primary">OCRで読み取る</button>
        <button id="resetButton" type="button" class="btn btn--ghost">リセット</button>
      </div>

      <p class="status" id="status">画像を選んでください。</p>
    </section>

    <section class="card">
      <h2 class="card__title">イベント情報</h2>

      <form id="eventForm" class="form">
        <label class="field">
          <span class="field__label">タイトル</span>
          <input id="titleInput" type="text" placeholder="イベント名" />
        </label>
        <div class="field-row">
          <label class="field">
            <span class="field__label">日付</span>
            <input id="dateInput" type="date" />
          </label>
          <label class="field">
            <span class="field__label">開始</span>
            <input id="startTimeInput" type="time" />
          </label>
          <label class="field">
            <span class="field__label">終了</span>
            <input id="endTimeInput" type="time" />
          </label>
        </div>
        <label class="field">
          <span class="field__label">場所</span>
          <input id="locationInput" type="text" placeholder="会場・住所" />
        </label>
        <label class="field">
          <span class="field__label">詳細</span>
          <textarea id="detailsInput" rows="4"></textarea>
        </label>
      </form>

      <div class="notepanel">
        <div class="notepanel__head">
          <span class="field__label">読み取り本文</span>
          <button id="copyTextButton" type="button" class="btn btn--text">本文をコピー</button>
        </div>
        <textarea id="ocrText" rows="7" placeholder="OCRで読み取った本文がここに表示されます"></textarea>
      </div>

      <div class="actions actions--end">
        <button id="calendarButton" type="button" class="btn btn--primary">Google カレンダーで作成</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
